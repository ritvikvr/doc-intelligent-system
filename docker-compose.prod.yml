# Production Docker Compose Configuration
# API-only deployment without Redis/Celery

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-intelligent-api-prod
    environment:
      ENVIRONMENT: production
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-groq-1.1-mini}
      GROQ_API_URL: ${GROQ_API_URL:-https://api.groq.com/v1}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 main:app
    restart: always
    networks:
      - doc-net
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  doc-net:
    driver: bridge
