version: '3.8'

services:
  api:
    build: .
    container_name: doc-intelligent-api
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-groq-1.1-mini}
      GROQ_API_URL: ${GROQ_API_URL:-https://api.groq.com/v1}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
